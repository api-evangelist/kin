aid: kin
name: Kin Insurance
description: >-
  Kin Insurance is a direct-to-consumer home insurance platform founded in 2016
  that leverages data and artificial intelligence to provide homeowners insurance
  in high-risk coastal and weather-exposed markets. The platform uses thousands
  of property data points for automated underwriting, enabling online quote
  generation, policy binding, and claims management without the need for
  traditional agents. Kin offers homeowners, condo, flood, and auto insurance
  across multiple states with a focus on affordability and accessibility in
  markets traditionally underserved by major carriers.
